<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Aegis Capital | Forgot Password</title>
    <link rel="stylesheet" href="index.css">
</head>
<body>

<div class="container">
    <div class="logo-container">
        <svg class="bank-icon" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg"><path d="M12 2L2 7V11C2 16.5 6.2 21.6 12 23C17.8 21.6 22 16.5 22 11V7L12 2ZM12 11H20C19.5 15.1 16.3 18.7 12 20.8V11H4V8.2L12 4.2V11Z" fill="url(#goldGradient)"/><defs><linearGradient id="goldGradient" x1="0" y1="0" x2="24" y2="24" gradientUnits="userSpaceOnUse"><stop stop-color="#BF953F"/><stop offset="0.5" stop-color="#FCF6BA"/><stop offset="1" stop-color="#B38728"/></linearGradient></defs></svg>
        <h1 class="brand-name">Aegis Capital</h1>
    </div>

    <!-- Step 1: Verification & Reset Form -->
    <div id="step1">
        <h2>Reset Password</h2>
        <p class="subtitle">Enter your registered email and your current 6-digit Authenticator code to reset your password.</p>
        <div id="msg1" class="msg"></div>
        <form id="resetForm">
            <div class="form-group">
                <label for="email">Email Address</label>
                <input type="email" id="email" required placeholder="john@example.com">
            </div>
            <div class="form-group">
                <label for="mfaCode">Authenticator Code (6 digits)</label>
                <input type="text" id="mfaCode" required placeholder="e.g. 123456" pattern="\d{6}">
            </div>
            <div class="form-group">
                <label for="newPassword">New Password</label>
                <input type="password" id="newPassword" required placeholder="Minimum 8 characters" minlength="8">
            </div>
            <div class="form-group">
                <label for="confirmPassword">Confirm New Password</label>
                <input type="password" id="confirmPassword" required placeholder="Repeat new password">
            </div>
            <button type="submit" id="resetBtn">Secure Reset Password</button>
        </form>
    </div>

    <!-- Step 3: Success -->
    <div id="step3" style="display:none;text-align:center;">
        <div style="font-size:60px;margin-bottom:20px;">✅</div>
        <h2>Password Reset!</h2>
        <p class="subtitle">Your password has been updated successfully.</p>
        <button onclick="window.location.href='login.html'" style="margin-top:20px;">Back to Login</button>
    </div>

    <div class="links" id="backLink">
        <a href="login.html">← Back to Login</a>
    </div>
</div>

<script>
    const API_BASE_URL = 'http://localhost:5052';

    function showMsg(id, text, type) {
        const el = document.getElementById(id);
        el.textContent = text;
        el.className = `msg ${type}`;
    }
    document.getElementById('resetForm').addEventListener('submit', async (e) => {
        e.preventDefault();
        const newPassword = document.getElementById('newPassword').value;
        const confirm = document.getElementById('confirmPassword').value;
        
        if (newPassword !== confirm) {
            showMsg('msg1', 'Passwords do not match.', 'error');
            return;
        }

        const email = document.getElementById('email').value.trim();
        const mfaCode = document.getElementById('mfaCode').value.trim();
        const btn = document.getElementById('resetBtn');
        
        btn.disabled = true;
        btn.textContent = 'Verifying & Resetting...';
        
        try {
            const res = await fetch(`${API_BASE_URL}/auth/reset-password-mfa`, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ email, mfaCode, newPassword })
            });
            const data = await res.json();
            
            if (res.ok) {
                document.getElementById('step1').style.display = 'none';
                document.getElementById('step3').style.display = 'block';
                document.getElementById('backLink').style.display = 'none';
            } else {
                showMsg('msg1', data.message || 'Reset failed. Check your Authenticator code.', 'error');
            }
        } catch (err) {
            showMsg('msg1', 'Could not connect to server.', 'error');
        } finally {
            btn.disabled = false;
            btn.textContent = 'Secure Reset Password';
        }
    });
</script>
</body>
</html>
