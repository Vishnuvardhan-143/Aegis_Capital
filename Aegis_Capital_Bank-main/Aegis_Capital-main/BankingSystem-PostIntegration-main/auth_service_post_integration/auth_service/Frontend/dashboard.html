<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8"/>
    <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
    <title>Aegis Capital | Dashboard</title>
    <link rel="stylesheet" href="index.css"/>
</head>
<body>

<!-- Profile Icon -->
<div class="profile-wrapper">
    <div id="profileIcon" class="profile-icon">
        <span id="profileInitial">U</span>
    </div>

    <div id="profileDropdown" class="profile-dropdown" aria-hidden="true">
        <h4 id="profileName">User Name</h4>
        <p id="profileEmail">user@email.com</p>

        <div class="profile-details">
            <p><strong>DOB:</strong> <span id="profileDob">-</span></p>
            <p><strong>Mobile:</strong> <span id="profileMobile">-</span></p>
            <p><strong>PAN:</strong> <span id="profilePan">-</span></p>
        </div>

        <button id="profileLogout">Logout</button>
    </div>
</div>

<div class="container dashboard-container">
    <div class="logo-container">
        <svg class="bank-icon" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg"><path d="M12 2L2 7V11C2 16.5 6.2 21.6 12 23C17.8 21.6 22 16.5 22 11V7L12 2ZM12 11H20C19.5 15.1 16.3 18.7 12 20.8V11H4V8.2L12 4.2V11Z" fill="url(#goldGradient)"/><defs><linearGradient id="goldGradient" x1="0" y1="0" x2="24" y2="24" gradientUnits="userSpaceOnUse"><stop stop-color="#BF953F"/><stop offset="0.5" stop-color="#FCF6BA"/><stop offset="1" stop-color="#B38728"/></linearGradient></defs></svg>
        <h1 class="brand-name" style="font-size: 24px;">Aegis Capital</h1>
    </div>
    <h2>Dashboard</h2>
    <p class="subtitle">Welcome to your secure client portal.</p>

    <div id="dataBox" class="msg"
         style="display:block;background-color:var(--surface);color:var(--text);padding:20px;border:1px dashed var(--border);">
        Loading secure data...
    </div>

    <div style="display: flex; gap: 15px; margin-top: 30px;">
        <button id="goToAccountsBtn" style="background-color: var(--primary);">Go to My Accounts</button>
        <button id="logoutBtn" style="background-color: var(--border);">Log Out</button>
    </div>
</div>

<script>
    const API_BASE_URL = 'http://localhost:8080'; // backend origin

    window.addEventListener('DOMContentLoaded', async () => {
      const token = localStorage.getItem('jwt');
      if (!token) {
        window.location.href = 'login.html';
        return;
      }

      const dataBox = document.getElementById('dataBox');

      // 1) Dashboard welcome text
      try {
        const response = await fetch(`${API_BASE_URL}/api/dashboard`, {
          method: 'GET',
          headers: { 'Authorization': `Bearer ${token}` }
        });

        if (response.ok) {
          const text = await response.text();
          dataBox.innerHTML = text;   // e.g., “Welcome back, kesamreddy!”
          dataBox.style.borderColor = 'var(--success)';
        } else {
          dataBox.textContent = 'Failed to load secure data. Token might be expired or invalid.';
          dataBox.style.borderColor = 'var(--error)';
          dataBox.style.color = 'var(--error)';
          setTimeout(() => window.location.href = 'login.html', 1500);
        }
      } catch (err) {
        console.error(err);
        dataBox.textContent = 'Error connecting to the server.';
      }

      // 2) Profile dropdown handlers
      const profileIcon = document.getElementById('profileIcon');
      const profileDropdown = document.getElementById('profileDropdown');
      const profileLogout = document.getElementById('profileLogout');

      if (profileIcon && profileDropdown) {
        profileIcon.addEventListener('click', (e) => {
          e.stopPropagation();
          const open = profileDropdown.getAttribute('aria-hidden') === 'false';
          profileDropdown.setAttribute('aria-hidden', open ? 'true' : 'false');
        });

        profileDropdown.addEventListener('click', (e) => { e.stopPropagation(); });

        document.addEventListener('click', (e) => {
          if (!profileIcon.contains(e.target) && !profileDropdown.contains(e.target)) {
            profileDropdown.setAttribute('aria-hidden', 'true');
          }
        });

        document.addEventListener('keydown', (e) => {
          if (e.key === 'Escape') {
            profileDropdown.setAttribute('aria-hidden', 'true');
          }
        });
      }

      // 3) Fetch profile data
      try {
        const resp = await fetch(`${API_BASE_URL}/api/profile`, {
          headers: { 'Authorization': `Bearer ${token}` }
        });

        if (resp.ok) {
          const user = await resp.json();

          // Safer getter
          const get = (obj, key, fallback = '-') => {
            if (!obj || !(key in obj)) return fallback;
            const val = obj[key];
            if (val === undefined || val === null) return fallback;
            if (typeof val === 'string' && val.trim() === '') return fallback;
            return val;
          };

          document.getElementById('profileName').textContent   = get(user, 'name', 'User');
          document.getElementById('profileEmail').textContent  = get(user, 'email');
          document.getElementById('profileDob').textContent    = get(user, 'dob');
          document.getElementById('profileMobile').textContent = get(user, 'mobileNo');
          document.getElementById('profilePan').textContent    = get(user, 'panNo');

          const initialSource = get(user, 'name', 'U');
          document.getElementById('profileInitial').textContent =
            (initialSource && initialSource[0] ? initialSource[0] : 'U').toUpperCase();
        } else {
          const t = await resp.text().catch(() => '');
          console.warn('Profile fetch failed with status:', resp.status, t);
        }
      } catch (err) {
        console.error('Failed to load profile', err);
      }

      // 4) Navigation and Logout buttons
      document.getElementById('goToAccountsBtn')?.addEventListener('click', () => {
        // Redirect to Account Microservice and pass token in URL
        window.location.href = `http://localhost:5501/index.html?token=${token}`;
      });

      document.getElementById('logoutBtn')?.addEventListener('click', () => {
        localStorage.removeItem('jwt');
        localStorage.removeItem('mfaEmail');
        window.location.href = 'login.html';
      });

      profileLogout?.addEventListener('click', () => {
        localStorage.clear();
        window.location.href = 'login.html';
      });
    });
</script>
</body>
</html>
